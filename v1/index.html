<!DOCTYPE html>
<html>
<head>
	<style>
		body {
			font-family: Arial;
			background: #0b1e2d;
			color: white;
			padding: 20px;
		}

		#alert {
			background: #b91c1c;
			padding: 10px;
			margin-bottom: 10px;
			border-radius: 8px;
		}

		#explanation {
			margin-top: 10px;
			background: #1e3a5f;
			padding: 10px;
			border-radius: 8px;
		}


	</style>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>StormChill</title>
</head>
<body>

	<h1>StormChill</h1>

	<h2 id="temp">Loading temperature...</h2>

	<h3 id="location">Getting location...</h3>

	<div id="alert"></div>
	<div id="explanation"></div>

	<script>
		function getLocation() {
			if (navigator.geolocation) {
				navigator.geolocation.getCurrentPosition(success, error);
			} else {
				alert("Geolocation is not supported by this browser.");
			}
		}

		function success(position) {
			const lat = position.coords.latitude;
			const lon = position.coords.longitude;

			//console.log("Lat:", lat, "Lon:", lon);

			document.getElementById("location").innerText = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;

			getTemperature(lat, lon); //reuse your function
			getAlerts(lat, lon);
		}

		function error() {
			alert("Unable to retrieve your location.");
		}

		async function getTemperature(lat, lon){

			try {
				const pointResponse = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
				const pointData = await pointResponse.json();

				// Get city/state
				const city = pointData.properties.relativeLocation.properties.city;
				const state = pointData.properties.relativeLocation.properties.state;

				document.getElementById("location").innerText = `${city}, ${state}`;

				// Get observation stations
				const stationResponse = await fetch(pointData.properties.observationStations);
				const stationData = await stationResponse.json();

				// Use the first station
				const stationUrl = stationData.features[0].id;

				// Get latest observation
				const obsResponse = await fetch(`${stationUrl}/observations/latest`);
				const obsData = await obsResponse.json();

				const tempC = obsData.properties.temperature.value;

				// Convert C -> F
				const tempF = Number((tempC * 9/5) + 32);

				// Get forecast
				const forecastResponse = await fetch(pointData.properties.forecast);
				const forecastData = await forecastResponse.json();

				const current = forecastData.properties.periods[0];

				// Explain the weather conditions
				//const explanation = explainWeather(current.shortForecast, tempF);

				document.getElementById("temp").innerText = `${Math.round(tempF)}°F - ${current.shortForecast}`;

				document.getElementById("explanation").style.whiteSpace = "pre-line";

				document.getElementById("explanation").innerText = explainWeather(current.shortForecast, tempF);				

				

			} catch (error) {
			console.error(error);
			document.getElementById("temp").innerText = "Failed to load temperature";
			}
			
		}

		async function getAlerts(lat, lon){
			const response = await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`);
			const data = await response.json();

			if (data.features.length > 0){
				const alertName = data.features[0].properties.event;
				const alertBox = document.getElementById("alert");

				alertBox.innerHTML = "";
				const strong = document.createElement("strong");
				strong.innerText = alertName;

				alertBox.appendChild(strong);
				alertBox.append(` - ${explainAlert(alertName)}`);

				//document.getElementById("alert").innerHTML = `<strong>${alert}</strong> - ${explainAlert(alert)}`;

				//document.getElementById("explanation").innerText = explainAlert(alert);
			} else {
				document.getElementById("alert").innerText = "No active alerts";
			}
		}

		function explainAlert(alert){
			if (alert.includes("Tornado")) {
				return "A tornado may be forming. Go to an interior room immediately.";
			}

			if (alert.includes("Severe Thunderstorm")) {
				return "A strong storm is nearby. Stay indoors and away from windows.";
			}

			return "Conditions are changing. Stay aware.";
		}

		function explainWeather(forecast, tempF) {
			tempF = Number(tempF); // force conversion

			let conditionMessage = "";
			let tempMessage = "";

			// Condition-based
			if (forecast.includes("Partly Cloudy")){
				conditionMessage = "You'll see a mix of sun and clouds today. It should feel calm and comfortable.";
			}else if (forecast.includes("Mostly Cloudy")) {
				conditionMessage = "Clouds will cover most of the sky, making it feel dim and cooler.";
			}else if (forecast.includes("Sunny")) {
				conditionMessage = "Clear skies mean lots of sunshine and good visibility.";
			}else if (forecast.includes("Rain")) {
				conditionMessage = "Moisture in the air is condensing into rain. Expect wet conditions and reduced visibility.";
			}else if (forecast.includes("Thunderstorm")) {
				conditionMessage = "Warm, rising air is creating storm clouds that can produce lightning, heavy rain, and strong winds.";
			} else {
				conditionMessage = "weather conditions are stable right now."
			}

			// Temperature-based add-on
			if (tempF >= 95) {
				tempMessage += " It will feel very hot and intense outside.";
			} else if (tempF >= 85) {
				tempMessage += " It will feel warm to hot.";
			} else if (tempF >= 70) {
				tempMessage += " Temperatures should feel comfortable.";
			} else if (tempF >= 55) {
				tempMessage += " It may feel a bit cool.";
			} else {
				tempMessage += "It will feel cold, so dress warmly.";
			}

			return `${conditionMessage}\n\n${tempMessage}`;
		}

		getLocation();

		

	</script>

</body>
</html>
